<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsLife · 运维老兵的技术笔记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .archive-wrap { max-width: 760px; margin: 0 auto; padding: 7rem 2rem 5rem; position: relative; z-index: 1; }
    .archive-wrap h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.4rem; }
    .archive-count { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 3rem; }
    .year-group { margin-bottom: 2.5rem; }
    .year-label {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem;
    }
    .archive-item {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 0.65rem 0; border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    .archive-item:last-child { border-bottom: none; }
    .archive-item:hover .item-title { color: var(--accent); }
    .item-date { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .item-title { font-size: 0.95rem; color: var(--text); flex: 1; }
    .item-category {
      font-size: 0.72rem; padding: 0.15rem 0.55rem; border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent); white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<nav class="navbar">
  <a href="index.html" class="logo">Ops<span>Life</span></a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">首页</a></li>
    <li><a href="about.html">关于我</a></li>
    <li><a href="https://github.com/stanhui/blog" target="_blank">GitHub</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:0.75rem">
    <button class="theme-toggle" aria-label="切换主题"></button>
    <button class="menu-toggle" aria-label="菜单"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="archive-wrap">
  <h1>OpsLife</h1>
  <p class="archive-count" id="archive-count"></p>
  <div id="archive-list"></div>
</div>

<footer>
  <p>© 2026 OpsLife · 用代码丈量世界 · Built with ❤️ &amp; ☕</p>
</footer>

<script src="js/posts.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const list = document.getElementById('archive-list');
  const countEl = document.getElementById('archive-count');
  countEl.textContent = `共 ${posts.length} 篇文章`;

  const byYear = {};
  posts.forEach(p => {
    const y = p.date.slice(0, 4);
    (byYear[y] = byYear[y] || []).push(p);
  });

  list.innerHTML = Object.keys(byYear).sort((a, b) => b - a).map(year => `
    <div class="year-group">
      <div class="year-label">${year}</div>
      ${byYear[year].map(p => `
        <a class="archive-item" href="${p.url || 'post.html?id=' + p.id}">
          <span class="item-date">${p.date.slice(5)}</span>
          <span class="item-title">${p.title}</span>
          <span class="item-category">${p.category}</span>
        </a>
      `).join('')}
    </div>
  `).join('');
});
</script>
</body>
</html>
